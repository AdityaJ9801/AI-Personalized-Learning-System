version: '3.9'

services:

  # ── PostgreSQL Database ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: eduai_postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-eduai_db}
      POSTGRES_USER:     ${POSTGRES_USER:-eduai_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eduai_secret_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eduai_user} -d ${POSTGRES_DB:-eduai_db}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  # ── Redis Cache ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: eduai_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Flask Backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eduai_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL:   postgresql://${POSTGRES_USER:-eduai_user}:${POSTGRES_PASSWORD:-eduai_secret_pass}@postgres:5432/${POSTGRES_DB:-eduai_db}
      REDIS_URL:      redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      SECRET_KEY:     ${SECRET_KEY:-change-me-in-production-min32chars!}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FLASK_ENV:      ${FLASK_ENV:-production}
      CORS_ORIGINS:   http://localhost,http://localhost:80,http://localhost:3000,http://localhost:3001
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── React Frontend ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eduai_frontend
    restart: unless-stopped
    ports:
      - "3005:3000"
    depends_on:
      backend:
        condition: service_healthy

  # ── Nginx Reverse Proxy ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: eduai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  uploads_data:
